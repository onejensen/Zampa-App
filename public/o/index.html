<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oferta en Zampa</title>
  <meta name="description" content="Mira esta oferta en Zampa.">
  <meta property="og:title" content="Mira esta oferta en Zampa">
  <meta property="og:description" content="Descubre el menú del día y los mejores restaurantes cerca de ti.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍽️%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --primary: #FF6B35;
      --bg: #FFF8F3;
      --text: #1A1A1A;
      --muted: #6B6B6B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 480px;
      text-align: center;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--primary);
    }
    p {
      font-size: 17px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .cta-primary {
      display: inline-block;
      padding: 16px 28px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 16px;
      transition: transform 0.15s;
    }
    .cta-primary:hover { transform: translateY(-2px); }
    .stores {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .store {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      background: var(--text);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">🍽️</div>
    <h1>Abrir en Zampa</h1>
    <p>Esta oferta te espera dentro de la app de Zampa.</p>

    <a class="cta-primary" href="#" id="open-app">Abrir en Zampa</a>

    <div class="stores">
      <a class="store" id="ios-store" href="https://apps.apple.com/app/idTODO">Descargar para iOS</a>
      <a class="store" id="android-store" href="https://play.google.com/store/apps/details?id=com.sozolab.eatout">Descargar para Android</a>
    </div>

    <p class="hint">Si ya tienes Zampa instalada se abrirá automáticamente.</p>
  </main>

  <script>
    (function () {
      // Extract offer id from /o/{id}
      var match = window.location.pathname.match(/^\/o\/([^\/?#]+)/);
      var offerId = match ? match[1] : null;

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /Android/.test(ua);

      var iosStoreUrl = 'https://apps.apple.com/app/idTODO';
      var androidStoreUrl = 'https://play.google.com/store/apps/details?id=com.sozolab.eatout';

      // Custom-scheme fallback. Universal/App Links should have already handled
      // the open before the page even rendered, so reaching this script means
      // either the app is not installed or the OS didn't intercept the URL.
      var customScheme = offerId ? 'zampa://offer/' + encodeURIComponent(offerId) : 'zampa://';

      var openBtn = document.getElementById('open-app');
      openBtn.setAttribute('href', customScheme);

      // Hide the wrong-platform store button
      if (isIOS) {
        document.getElementById('android-store').style.display = 'none';
      } else if (isAndroid) {
        document.getElementById('ios-store').style.display = 'none';
      }

      // On mobile, try to open the app immediately. If after 1.5s the page is
      // still visible (= app didn't open), redirect to the appropriate store.
      if (offerId && (isIOS || isAndroid)) {
        var timeout = setTimeout(function () {
          if (!document.hidden) {
            window.location.href = isIOS ? iosStoreUrl : androidStoreUrl;
          }
        }, 1500);

        // Cancel the redirect if the page becomes hidden (= app opened)
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) clearTimeout(timeout);
        });

        // Trigger the deep link
        window.location.href = customScheme;
      }
    })();
  </script>
</body>
</html>
